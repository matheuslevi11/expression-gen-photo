name: genphoto
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.1.1
  - torchvision=0.16.1
  - torchaudio=2.1.1
  - pytorch-cuda=12.1
  - pip
  # Pin numpy<2 so torch 2.1 wheels (built against numpy 1.x) keep working.
  # Everything below is pinned to a set that imports cleanly together; touch
  # with care -- the obvious latest-of-each does not co-install (numpy 2.x
  # breaks torch 2.1, scipy>=1.12 removed binom_test that py-feat needs,
  # mediapipe>=0.10.7 removed solutions.face_detection, etc.).
  - pip:
    - numpy==1.26.4
    - scipy==1.11.4
    - pandas==2.2.3
    - numexpr==2.8.4
    - matplotlib==3.9.2
    - opencv-python==4.10.0.84
    - opencv-contrib-python==4.10.0.84
    - mediapipe==0.10.5
    # huggingface_hub 0.26+ removed cached_download which diffusers 0.24 imports.
    - huggingface_hub==0.25.2
    - transformers==4.46.3
    - diffusers==0.24.0
    - xformers==0.0.23
    - imageio==2.36.0
    - imageio[ffmpeg]
    - gdown
    - einops
    - decord
    - omegaconf
    - safetensors
    - gradio
    - wandb
    - triton
    - termcolor
    - py-feat==0.6.1
    - Pillow
    - lpips
    # NOT listed above: facenet-pytorch (identity metric, scripts/batch_eval.py).
    # Its declared deps pin a newer torch and would move the stack, so install
    # it manually AFTER env creation:  pip install --no-deps facenet-pytorch==2.6.0
