# Smoke-test config: 5-step run on the small M003+W009 preprocessed set, used
# to verify the full training graph builds, the dataset feeds correctly, the
# 6-channel embedding flows through the encoder, the loss back-propagates, and
# the validation/inference pipeline produces a GIF. Not for real training.

resume_from: null

output_dir: "/tmp/genphoto_smoke"

# pandaphd's HF snapshot has the full SD1.5 stack with the GenPhoto-style
# `unet_merged` subfolder, plus the LoRA + motion module side-by-side.
pretrained_model_path: "/path/to/stable-diffusion-v1-5"
unet_subfolder: "unet_merged"

train_data:
  root_path:        "/tmp/mead_validation_out"
  annotation_json:  "annotations/train.json"
  clip_model_path:  "/path/to/stable-diffusion-v1-5"
  sample_n_frames:  5
  sample_size:      [256, 384]
  is_Train:         true
  prompt_template:  "<smile intensity: {value:.3f}>"
  emotion_filter:   "happy"

validation_data:
  root_path:        "/tmp/mead_validation_out"
  annotation_json:  "annotations/validation_smoke.json"
  clip_model_path:  "/path/to/stable-diffusion-v1-5"
  sample_n_frames:  5
  sample_size:      [256, 384]
  is_Train:         false
  prompt_template:  "<smile intensity: {value:.3f}>"
  emotion_filter:   "happy"

unet_additional_kwargs:
  use_motion_module:               true
  motion_module_resolutions:       [1, 2, 4, 8]
  unet_use_cross_frame_attention:  false
  unet_use_temporal_attention:     false
  motion_module_mid_block:         false
  motion_module_type:              Vanilla
  motion_module_kwargs:
    num_attention_heads:                 8
    num_transformer_block:               1
    attention_block_types:               ["Temporal_Self", "Temporal_Self"]
    temporal_position_encoding:          true
    temporal_position_encoding_max_len:  32
    temporal_attention_dim_div:          1
    zero_initialize:                     false

lora_rank:           2
lora_scale:          1.0
lora_ckpt:           "/path/to/RealEstate10K_LoRA.ckpt"
motion_module_ckpt:  "/path/to/v3_sd15_mm.ckpt"
motion_lora_rank:    0
motion_lora_scale:   1.0

camera_encoder_kwargs:
  downscale_factor:                    8
  channels:                            [320, 640, 1280, 1280]
  nums_rb:                             2
  cin:                                 384
  ksize:                               1
  sk:                                  true
  use_conv:                            false
  compression_factor:                  1
  temporal_attention_nhead:            8
  attention_block_types:               ["Temporal_Self"]
  temporal_position_encoding:          true
  temporal_position_encoding_max_len:  16

attention_processor_kwargs:
  add_spatial:               false
  spatial_attn_names:        'attn1'
  add_temporal:              true
  temporal_attn_names:       '0'
  camera_feature_dimensions: [320, 640, 1280, 1280]
  query_condition:           true
  key_value_condition:       true
  scale:                     1.0

noise_scheduler_kwargs:
  num_train_timesteps:  1000
  beta_start:           0.00085
  beta_end:             0.012
  beta_schedule:        "linear"
  steps_offset:         1
  clip_sample:          false

do_sanity_check: true

max_train_epoch:        -1
max_train_steps:        5
validation_steps:       1000        # never hit
validation_steps_tuple: [4]         # validation runs when global_step+1 == 4

learning_rate: 1.e-4

num_workers:           2
train_batch_size:      1
checkpointing_epochs:  -1
checkpointing_steps:   5

mixed_precision_training: true
global_seed:              42
logger_interval:          1
