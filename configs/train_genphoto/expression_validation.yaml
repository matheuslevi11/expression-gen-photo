# End-to-end validation config: same code path as the production
# `expression.yaml` (real MEAD_processed annotations, real pretrained backbones)
# but only a handful of steps, batch=1, and outputs on /databases-4tb so we
# don't fill the 99%-full root partition.

resume_from: null

output_dir: "./output/expression_validation"

pretrained_model_path: "/path/to/stable-diffusion-v1-5"
unet_subfolder: "unet_merged"

train_data:
  root_path:        "/path/to/MEAD_processed"
  annotation_json:  "annotations/train.json"
  clip_model_path:  "/path/to/stable-diffusion-v1-5"
  sample_n_frames:  5
  sample_size:      [256, 384]
  is_Train:         true
  prompt_template:  "<smile intensity: {value:.3f}>"
  emotion_filter:   "happy"

validation_data:
  root_path:        "/path/to/MEAD_processed"
  annotation_json:  "annotations/validation.json"
  clip_model_path:  "/path/to/stable-diffusion-v1-5"
  sample_n_frames:  5
  sample_size:      [256, 384]
  is_Train:         false
  prompt_template:  "<smile intensity: {value:.3f}>"
  emotion_filter:   "happy"

unet_additional_kwargs:
  use_motion_module:               true
  motion_module_resolutions:       [1, 2, 4, 8]
  unet_use_cross_frame_attention:  false
  unet_use_temporal_attention:     false
  motion_module_mid_block:         false
  motion_module_type:              Vanilla
  motion_module_kwargs:
    num_attention_heads:                 8
    num_transformer_block:               1
    attention_block_types:               ["Temporal_Self", "Temporal_Self"]
    temporal_position_encoding:          true
    temporal_position_encoding_max_len:  32
    temporal_attention_dim_div:          1
    zero_initialize:                     false

lora_rank:           2
lora_scale:          1.0
lora_ckpt:           "/path/to/RealEstate10K_LoRA.ckpt"
motion_module_ckpt:  "/path/to/v3_sd15_mm.ckpt"
motion_lora_rank:    0
motion_lora_scale:   1.0

camera_encoder_kwargs:
  downscale_factor:                    8
  channels:                            [320, 640, 1280, 1280]
  nums_rb:                             2
  cin:                                 384
  ksize:                               1
  sk:                                  true
  use_conv:                            false
  compression_factor:                  1
  temporal_attention_nhead:            8
  attention_block_types:               ["Temporal_Self"]
  temporal_position_encoding:          true
  temporal_position_encoding_max_len:  16

attention_processor_kwargs:
  add_spatial:               false
  spatial_attn_names:        'attn1'
  add_temporal:              true
  temporal_attn_names:       '0'
  camera_feature_dimensions: [320, 640, 1280, 1280]
  query_condition:           true
  key_value_condition:       true
  scale:                     1.0

noise_scheduler_kwargs:
  num_train_timesteps:  1000
  beta_start:           0.00085
  beta_end:             0.012
  beta_schedule:        "linear"
  steps_offset:         1
  clip_sample:          false

do_sanity_check: true

# 3 optimizer steps total (= 12 micro-batches with grad_accum=4).
# Validation pipeline fires at global_step+1 == 2 (capped to 2 val samples).
# Checkpoint at step 3 to confirm save path works.
max_train_epoch:        -1
max_train_steps:        3
validation_steps:       1000
validation_steps_tuple: [2]

learning_rate: 1.e-4

num_workers:           2
train_batch_size:      1
gradient_accumulation_steps: 4   # exercise the new accumulation code path
checkpointing_epochs:  -1
checkpointing_steps:   3

mixed_precision_training: true
global_seed:              42
logger_interval:          1

max_validation_samples: 2   # only generate 2 val GIFs per event (was 176)
